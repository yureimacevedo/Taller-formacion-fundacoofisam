function $(id){return document.getElementById(id);}
function pg(id){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  $(id).classList.add('on');
}
function col(mod){return db.collection('talleres').doc(mod);}
function subCol(mod,sub){return col(mod).collection(sub);}
function confeti(){
  var cs=['#E67E22','#27AE60','#2980B9','#9B59B6','#F1C40F'];
  for(var i=0;i<35;i++){
    var c=document.createElement('div');
    c.className='ci';
    c.style.left=Math.random()*100+'vw';
    c.style.top='-10px';
    c.style.background=cs[Math.floor(Math.random()*5)];
    c.style.setProperty('--d',(2+Math.random()).toFixed(1)+'s');
    c.style.setProperty('--dl',(Math.random()*1.2).toFixed(1)+'s');
    document.body.appendChild(c);
    setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},4000);
  }
}
function actualizarProgreso(){
  var total=TEMAS[S.mod].length+1;
  var hecho=S.completados.length;
  $('prog-txt').textContent=hecho+' de '+total+' completados';
  $('prog-fill').style.width=((hecho/total)*100)+'%';
  $('prog-fill').style.background=S.col;
}
function guardarLocal(){
  try{
    localStorage.setItem('taller_'+S.nombre+'_'+S.mod, JSON.stringify({
      completados:S.completados, escudo:S.escudo, etapa:S.etapa
    }));
  }catch(e){}
}
function cargarLocal(){
  try{
    var d=localStorage.getItem('taller_'+S.nombre+'_'+S.mod);
    if(d){var o=JSON.parse(d);S.completados=o.completados||[];S.escudo=o.escudo||["","","",""];}
  }catch(e){}
}

function ingresar(){
  var nombre=$('inp-nombre').value.trim();
  var codigo=$('inp-codigo').value.trim().toUpperCase();
  var err=$('err-login');
  if(!nombre){err.textContent='Escribe tu nombre.';err.classList.add('on');return;}
  if(!CODIGOS[codigo]){err.textContent='Código incorrecto.';err.classList.add('on');return;}
  err.classList.remove('on');
  var info=CODIGOS[codigo];
  S.nombre=nombre; S.mod=info.mod; S.nom=info.nom;
  S.col=info.col; S.claro=info.claro; S.chip=info.chip;
  if(info.mod==='admin'){
    pg('pg-admin');
    iniciarAdmin();
  } else {
    cargarLocal();
    $('app-titulo').textContent=S.nom;
    $('app-chip').innerHTML='<span class="tb-chip '+S.chip+'">'+S.nom+'</span>';
    pg('pg-app');
    mostrarMenu();
  }
}

// MENÚ PRINCIPAL (bienvenida con temas)
// ══════════════════════════════════════════════
function mostrarMenu(){
  actualizarProgreso();
  $('app-footer').style.display='none';
  var temas=TEMAS[S.mod];
  var total=temas.length+1;
  var html='<div class="pad">';
  html+='<h2 style="font-size:1.1rem;font-weight:800;margin-bottom:4px">¡Hola, '+S.nombre.split(' ')[0]+'!</h2>';
  html+='<p style="font-size:.85rem;color:#5A5A54;margin-bottom:20px">Selecciona una actividad para comenzar.</p>';
  // Quiz
  var quizDone=S.completados.indexOf(0)>-1;
  html+='<div class="tema-card '+(quizDone?'done':'activo')+'" id="tc-0">'+
    '<div class="tema-num" style="background:'+(quizDone?S.col:'#E8E8E2')+';color:'+(quizDone?'#fff':'#5A5A54')+'">1</div>'+
    '<div class="tema-info"><div class="tema-nombre">Quiz de identidad</div><div class="tema-tipo">🎮 5 preguntas interactivas</div></div>'+
    '<div class="tema-estado">'+(quizDone?'✅':'▶')+' </div></div>';
  // Temas
  temas.forEach(function(t,i){
    var done=S.completados.indexOf(i+1)>-1;
    var prevDone=S.completados.indexOf(i)>-1;
    var disponible=done||prevDone||(i===0&&S.completados.indexOf(0)>-1);
    html+='<div class="tema-card '+(done?'done':disponible?'activo':'')+'" id="tc-'+(i+1)+'" style="'+(disponible?'':'opacity:.5;pointer-events:none')+'">' +
      '<div class="tema-num" style="background:'+(done?S.col:disponible?'#E8E8E2':'#E8E8E2')+';color:'+(done?'#fff':'#5A5A54')+'">'+(i+2)+'</div>'+
      '<div class="tema-info"><div class="tema-nombre">'+t.nom+'</div><div class="tema-tipo">'+t.tipo+'</div></div>'+
      '<div class="tema-estado">'+(done?'✅':disponible?'▶':'🔒')+'</div></div>';
  });
  // Si todos completos
  if(S.completados.length>=total){
    html+='<button class="btn bv" id="btn-ver-cierre" style="margin-top:8px">🎉 Ver mi resumen final</button>';
  }
  html+='</div>';
  $('app-contenido').innerHTML=html;
  // eventos
  var tc0=$('tc-0');
  if(tc0) tc0.addEventListener('click',function(){iniciarQuiz();});
  temas.forEach(function(_,i){
    var el=$('tc-'+(i+1));
    if(el) el.addEventListener('click',function(){iniciarTema(i);});
  });
  var btnCierre=$('btn-ver-cierre');
  if(btnCierre) btnCierre.addEventListener('click',mostrarCierre);
}

function iniciarQuiz(){
  S.quizIdx=0; S.quizScore=0; S.quizResps=[];
  $('app-footer').style.display='none';
  renderPregunta();
}
function renderPregunta(){
  var qs=QUIZ[S.mod];
  var i=S.quizIdx;
  if(i>=qs.length){finQuiz();return;}
  var q=qs[i];
  // progreso quiz
  $('prog-txt').textContent='Pregunta '+(i+1)+' de '+qs.length;
  $('prog-fill').style.width=(((i+1)/qs.length)*100)+'%';
  $('prog-fill').style.background=S.col;
  var html='<div class="pad">';
  html+='<p style="font-size:.75rem;font-weight:700;color:'+S.col+';text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Pregunta '+(i+1)+' de '+qs.length+'</p>';
  html+='<p class="quiz-enunc">'+q.p+'</p>';
  html+='<div class="quiz-ops">'+q.ops.map(function(o,j){
    return '<button class="quiz-op" data-j="'+j+'">'+o+'</button>';
  }).join('')+'</div>';
  html+='<div class="quiz-fb" id="qfb"></div>';
  html+='</div>';
  $('app-contenido').innerHTML=html;
  $('app-footer').style.display='none';
  document.querySelectorAll('.quiz-op').forEach(function(btn){
    btn.addEventListener('click',function(){responder(parseInt(btn.dataset.j));});
  });
}
function responder(j){
  var q=QUIZ[S.mod][S.quizIdx];
  document.querySelectorAll('.quiz-op').forEach(function(b){b.disabled=true;});
  document.querySelectorAll('.quiz-op')[j].classList.add(j===q.c?'ok':'mal');
  if(j!==q.c) document.querySelectorAll('.quiz-op')[q.c].classList.add('ok');
  if(j===q.c) S.quizScore++;
  S.quizResps.push({pregunta:q.p,opcion:q.ops[j],correcta:q.ops[q.c],ok:j===q.c});
  var fb=$('qfb');
  fb.textContent=(j===q.c?'✅ ':'❌ ')+q.fb;
  fb.classList.add('on',j===q.c?'ok':'mal');
  // botón siguiente
  $('app-footer').style.display='';
  $('btn-accion').textContent=S.quizIdx<QUIZ[S.mod].length-1?'Siguiente →':'Ver resultado →';
  $('btn-accion').onclick=function(){S.quizIdx++;renderPregunta();};
}
function finQuiz(){
  var total=QUIZ[S.mod].length;
  var msgs=["¡Buen comienzo! Hay mucho por descubrir.","¡Bien! Ya conoces bastante del equipo.","¡Muy bien! Tienes buen ojo para el equipo.","¡Excelente! Conoces muy bien a tu equipo.","¡Perfecto! Eres un referente del equipo."];
  var msg=msgs[Math.min(Math.floor(S.quizScore/total*5),4)];
  actualizarProgreso();
  var html='<div class="pad"><div class="quiz-score">'+
    '<div class="score-num" style="color:'+S.col+'">'+S.quizScore+'/'+total+'</div>'+
    '<div class="score-msg">'+msg+'</div></div></div>';
  $('app-contenido').innerHTML=html;
  $('app-footer').style.display='';
  $('btn-accion').textContent='Guardar y continuar →';
  $('btn-accion').onclick=function(){
    // Guardar quiz en Firebase
    subCol(S.mod,'quiz').doc(S.nombre)
      .set({nombre:S.nombre,score:S.quizScore,total:total,resps:S.quizResps,ts:Date.now()})
      .catch(function(){});
    completar(0);
  };
}

function renderTermoHTML(temaIdx){
  var items=TERMO[S.mod];
  var html='<p class="sec-label">Termómetro del equipo</p>';
  html+='<p style="font-size:.82rem;color:#5A5A54;margin-bottom:10px">Califica del 1 al 10 cada afirmación.</p>';
  items.forEach(function(item,i){
    html+='<div class="termo-item">'+
      '<div class="termo-label">'+item+'</div>'+
      '<div class="termo-row">'+
      '<span style="font-size:.7rem;color:#5A5A54">Poco</span>'+
      '<input type="range" class="termo-sl" id="ts'+temaIdx+'_'+i+'" min="1" max="10" value="5" '+
      'style="background:linear-gradient(to right,#E67E22 40%,#ddd 40%)">'+
      '<span style="font-size:.7rem;color:#5A5A54">Mucho</span>'+
      '<div class="termo-val" id="tv'+temaIdx+'_'+i+'" style="background:#E67E22">5</div></div>'+
      '<div class="termo-etiq"><span>1</span><span>5</span><span>10</span></div></div>';
  });
  html+='<div class="termo-res" id="tres-'+temaIdx+'"></div>';
  return html;
}
function iniciarEventosTermo(temaIdx){
  TERMO[S.mod].forEach(function(_,i){
    var sl=$('ts'+temaIdx+'_'+i);
    if(sl) sl.addEventListener('input',function(){updateTermo(temaIdx,i);});
  });
}
function updateTermo(ti,i){
  var v=parseInt($('ts'+ti+'_'+i).value);
  var p=((v-1)/9)*100;
  var col=v<=3?'#27AE60':v<=6?'#E67E22':'#E74C3C';
  $('tv'+ti+'_'+i).textContent=v;
  $('tv'+ti+'_'+i).style.background=col;
  $('ts'+ti+'_'+i).style.background='linear-gradient(to right,'+col+' 0%,'+col+' '+p+'%,#ddd '+p+'%)';
  // calcular y mostrar resultado al momento
  calcTermoSilencioso(ti);
}
function calcTermoSilencioso(ti){
  var items=TERMO[S.mod];
  var vals=items.map(function(_,i){
    var el=$('ts'+ti+'_'+i);
    return el?parseInt(el.value):5;
  });
  var prom=vals.reduce(function(a,b){return a+b;},0)/vals.length;
  var col=prom<=3?'#1A5C2E':prom<=6?'#E67E22':'#E74C3C';
  var emoji=prom<=3?'🟢':prom<=6?'🟡':'🔴';
  var msg=prom<=3?'Puntajes bajos aquí son positivos.':prom<=6?'¡Reconocerlo es el primer paso!':'Estos temas necesitan atención del equipo.';
  var r=$('tres-'+ti);
  if(r){
    r.innerHTML='<div style="font-size:1.1rem;margin-bottom:4px">'+emoji+'</div>'+
      '<div style="font-size:.9rem;font-weight:700;color:'+col+'">Promedio: '+prom.toFixed(1)+'/10</div>'+
      '<div style="font-size:.8rem;color:#5A5A54;margin-top:3px">'+msg+'</div>';
    r.style.background=col+'15';r.style.border='1px solid '+col+'50';r.classList.add('on');
    S.termometros[ti]={vals:vals,prom:prom.toFixed(1)};
  }
}

  // Aplicar estado si ya hay respuestas
  return html;
}
function iniciarEventosEscudo(temaIdx){
  // Restaurar estado visual
  [0,1,2,3].forEach(function(i){
    actualizarCuadrante(i);
    var el=$('eq-'+i);
    if(el) el.addEventListener('click',function(){abrirModalEscudo(i);});
  });
  actualizarEscudoLema();
}
function actualizarCuadrante(i){
  var p=$('eq-'+i+'-p');
  var r=$('eq-'+i+'-r');
  if(!p||!r) return;
  if(S.escudo[i]){
    p.style.display='none';
    r.textContent=S.escudo[i];
    r.style.display='';
  } else {
    p.style.display='';
    r.style.display='none';
  }
}
function actualizarEscudoLema(){
  var llenos=S.escudo.filter(function(x){return x;}).length;
  var prog=$('escudo-prog');
  if(prog) prog.textContent=llenos+'/4 completados';
  var lema=$('escudo-lema');
  if(lema){
    if(S.escudo[3]){lema.textContent='"'+S.escudo[3]+'"';lema.style.display='';}
    else lema.style.display='none';
  }
}
function abrirModalEscudo(idx){
  S.escudoIdx=idx;
  var labels=['Lo que nos define — ¿Quiénes somos?','Lo que nos enorgullece — ¿Qué nos hace especiales?','Lo que queremos ser — ¿Cómo queremos ser recordados?','Nuestro lema — Una frase que nos represente'];
  $('modal-lbl').textContent=labels[idx];
  $('modal-ta').value=S.escudo[idx]||'';
  $('modal-escudo').classList.add('on');
  setTimeout(function(){$('modal-ta').focus();},100);
}
function cerrarModal(){$('modal-escudo').classList.remove('on');}
function guardarCuadrante(){
  var v=$('modal-ta').value.trim();
  if(!v) return;
  S.escudo[S.escudoIdx]=v;
  actualizarCuadrante(S.escudoIdx);
  actualizarEscudoLema();
  guardarLocal();
  cerrarModal();
}

  S.muroUnsub=subCol('conexion_social','muro').orderBy('ts').onSnapshot(function(snap){
    var el=$('muro-posts');

    var cols=['#D5F5E3','#D6EAF8','#FAD7A0','#E8DAEF','#FADBD8'];

      return '<div class="muro-post" style="background:'+cols[i%5]+'"><div class="muro-autor">'+p.nombre+'</div>'+p.texto+'</div>';
    }).join('');
  },function(){});
  var btnMuro=$('btn-pub-muro');
  if(btnMuro) btnMuro.addEventListener('click',function(){

  });
}

function iniciarAcuerdo(){
  if(S.acuerdoUnsub) S.acuerdoUnsub();
  S.acuerdoUnsub=subCol('conexion_social','compromisos').orderBy('votos','desc').onSnapshot(function(snap){
    var lista=$('acuerdo-lista');
    if(!lista) return;
    if(!snap.docs.length){lista.innerHTML='<p style="font-size:.83rem;color:#5A5A54">Aún no hay compromisos.</p>';return;}
    lista.innerHTML=snap.docs.map(function(d){
      var data=d.data();
      var yo=(data.votantes||[]).indexOf(S.nombre)>-1;
      return '<div class="acuerdo-item">'+
        '<div style="flex:1"><div>'+data.texto+'</div>'+
        '<div style="font-size:.7rem;color:#5A5A54;margin-top:3px">🙋 '+(data.votos||0)+' se unen</div></div>'+
        '<button class="voto-btn '+(yo?'on':'')+'" data-id="'+d.id+'" data-yo="'+yo+'">'+
        (yo?'✓':'+')+' Me uno</button></div>';
    }).join('');
    document.querySelectorAll('.voto-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(btn.dataset.yo==='true') return;
        subCol('conexion_social','compromisos').doc(btn.dataset.id).get().then(function(s){
          var d=s.data();
          s.ref.update({votos:(d.votos||0)+1,votantes:firebase.firestore.FieldValue.arrayUnion(S.nombre)});
        });
      });
    });
  },function(){});
  subCol('conexion_social','acuerdo').doc('firmantes').onSnapshot(function(s){
    if(!s.exists) return;
    var f=s.data().lista||[];
    var sec=$('firmantes-sec');
    if(!f.length||!sec) return;
    sec.style.display='';
    $('firmantes-lista').innerHTML=f.map(function(n){return '<span class="firmante">'+n+'</span>';}).join('');
  });
  var btnPub=$('btn-pub-acuerdo');
  if(btnPub) btnPub.addEventListener('click',function(){
    var txt=$('acuerdo-input').value.trim();
    if(!txt) return;
    subCol('conexion_social','compromisos').add({nombre:S.nombre,texto:txt,votos:0,votantes:[],ts:Date.now()}).catch(function(){});
    $('acuerdo-input').value='';
  });
  var btnFirmar=$('btn-firmar');
  if(btnFirmar) btnFirmar.addEventListener('click',function(){
    subCol('conexion_social','acuerdo').doc('firmantes')
      .set({lista:firebase.firestore.FieldValue.arrayUnion(S.nombre)},{merge:true}).catch(function(){});
    btnFirmar.textContent='✅ ¡Firmaste el Acuerdo!';
    btnFirmar.disabled=true;
  });
}

// GUARDAR TEMA Y COMPLETAR
// ══════════════════════════════════════════════
function guardarTema(idx){
  var t=TEMAS[S.mod][idx];
  var resps={};
  // Reflexiones
  if(t.reflexiones) t.reflexiones.forEach(function(_,i){
    var el=$('ref-'+idx+'-'+i);
    if(el&&el.value.trim()) resps[i]=el.value.trim();
  });
  if(Object.keys(resps).length){
    S.reflexiones[idx]=resps;
    subCol(S.mod,'reflexiones').doc(S.nombre+'_t'+idx)
      .set({nombre:S.nombre,temaIdx:idx,resps:resps,ts:Date.now()}).catch(function(){});
  }
  // Termómetro
  if(t.termometro&&S.termometros[idx]){
    subCol(S.mod,'termometros').doc(S.nombre+'_t'+idx)
      .set({nombre:S.nombre,temaIdx:idx,vals:S.termometros[idx].vals,prom:S.termometros[idx].prom,ts:Date.now()})
      .catch(function(){});
  }
  // Escudo
  if(t.escudo){
    subCol('conexion_social','escudos').doc(S.nombre)
      .set({nombre:S.nombre,escudo:S.escudo,ts:Date.now()}).catch(function(){});
  }
  completar(idx+1);
}
function completar(idx){
  if(S.completados.indexOf(idx)<0) S.completados.push(idx);
  guardarLocal();
  actualizarProgreso();
  var total=TEMAS[S.mod].length+1;
  if(S.completados.length>=total){mostrarCierre();return;}
  mostrarMenu();
}

  html+='<button class="btn bo" id="btn-compartir">📤 Compartir mi resumen</button>';

function iniciarAdmin(){
  $('atab-muro').style.display='';
  $('atab-acuerdo').style.display='';
  cargarSecAdmin('panel');
}
function cargarSecAdmin(sec){
  document.querySelectorAll('.asec').forEach(function(s){s.classList.remove('on');});
  $('asec-'+sec).classList.add('on');
  document.querySelectorAll('.atab').forEach(function(t){t.classList.remove('on');});
  document.querySelector('.atab[data-sec="'+sec+'"]').classList.add('on');
  var mod=S.adminMod;
  if(sec==='panel') adminPanel(mod);
  else if(sec==='quiz') adminQuiz(mod);
  else if(sec==='termometros') adminTermometros(mod);
  else if(sec==='reflexiones') adminReflexiones(mod);
  else if(sec==='muro') adminMuro();
  else if(sec==='acuerdo') adminAcuerdo();
}

function adminPanel(mod){
  var el=$('asec-panel');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var col2=mod==='artistica'?'#7D3C0F':'#1A5C2E';
  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  var esperados=mod==='artistica'?7:20;
  Promise.all([
    subCol(mod,'quiz').get(),
    subCol(mod,'reflexiones').get(),
    subCol(mod,'termometros').get(),
    mod==='conexion_social'?subCol(mod,'escudos').get():Promise.resolve({docs:[]}),
  ]).then(function(res){
    var quizSnap=res[0],refSnap=res[1],terSnap=res[2],escSnap=res[3];
    var parts={};
    quizSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].quiz=true;});
    refSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].ref++;});
    terSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].ter=true;});
    escSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].esc=true;});
    var total=Object.keys(parts).length;
    var conQuiz=Object.values(parts).filter(function(p){return p.quiz;}).length;
    var conTer=Object.values(parts).filter(function(p){return p.ter;}).length;
    var conRef=Object.values(parts).filter(function(p){return p.ref>0;}).length;
    var html='<div class="stat-grid">'+
      '<div class="stat-card" style="border-left:4px solid '+col2+'"><div class="stat-num" style="color:'+col2+'">'+total+'</div><div class="stat-lbl">Activos de '+esperados+'</div></div>'+
      '<div class="stat-card" style="border-left:4px solid #9B59B6"><div class="stat-num" style="color:#4A235A">'+conQuiz+'</div><div class="stat-lbl">Completaron quiz</div></div>'+
      '<div class="stat-card" style="border-left:4px solid #2980B9"><div class="stat-num" style="color:#154360">'+conTer+'</div><div class="stat-lbl">Termómetro</div></div>'+
      '<div class="stat-card" style="border-left:4px solid '+col2+'"><div class="stat-num" style="color:'+col2+'">'+conRef+'</div><div class="stat-lbl">Reflexiones</div></div>'+
    '</div>';
    html+='<p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;padding:0 16px 8px">Participantes</p>';
    if(!total){html+='<div class="vacio">Aún no hay participantes.</div>';}
    else{
      Object.entries(parts).forEach(function(e){
        var n=e[0]||'(sin nombre)',d=e[1];
        var etapas=(d.quiz?1:0)+(d.ref>0?1:0)+(d.ter?1:0)+(d.esc?1:0);
        var pct=Math.round((etapas/4)*100);
        html+='<div class="p-row">'+
          '<div class="p-av" style="background:'+claro2+';color:'+col2+'">'+n.charAt(0).toUpperCase()+'</div>'+
          '<div style="flex:1"><div style="font-size:.88rem;font-weight:600">'+n+'</div>'+
          '<div style="font-size:.75rem;color:#5A5A54">'+(d.quiz?'🎮 ':'')+( d.ter?'🌡️ ':'')+( d.ref>0?'💭 ':'')+( d.esc?'🛡️ ':'')+' </div></div>'+
          '<div class="mbar"><div class="mbar-bg"><div class="mbar-fill" style="width:'+pct+'%;background:'+col2+'"></div></div>'+
          '<div class="mpct" style="color:'+col2+'">'+pct+'%</div></div></div>';
      });
    }
    el.innerHTML=html;
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

function adminQuiz(mod){
  var el=$('asec-quiz');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var col2=mod==='artistica'?'#7D3C0F':'#1A5C2E';
  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  subCol(mod,'quiz').get().then(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">Aún no hay respuestas del quiz.</div>';return;}
    // Agrupar respuestas por pregunta
    var pregs=QUIZ[mod];
    var stats=pregs.map(function(){return {ok:0,total:0};});
    var porPersona=[];
    snap.docs.forEach(function(d){
      var data=d.data();
      porPersona.push({nombre:data.nombre,score:data.score,total:data.total,resps:data.resps||[]});
      if(data.resps) data.resps.forEach(function(r,i){
        if(stats[i]){stats[i].total++;if(r.ok)stats[i].ok++;}
      });
    });
    var html='<div class="acard"><div class="acard-t">Resultados por pregunta ('+snap.size+' respuestas)</div>';
    pregs.forEach(function(q,i){
      var s=stats[i];
      var pct=s.total>0?Math.round((s.ok/s.total)*100):0;
      var col3=pct>=70?'#27AE60':pct>=50?'#E67E22':'#E74C3C';
      html+='<div class="ti-item">'+
        '<div class="ti-row"><span style="font-size:.82rem">'+q.p+'</span><span style="font-weight:800;color:'+col3+'">'+pct+'%</span></div>'+
        '<div class="ti-bar"><div class="ti-fill" style="width:'+pct+'%;background:'+col3+'"></div></div>'+
        '<div style="font-size:.7rem;color:#5A5A54">'+s.ok+' correctas de '+s.total+'</div></div>';
    });
    html+='</div>';
    html+='<p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;padding:0 16px 8px">Por participante</p>';
    porPersona.sort(function(a,b){return (b.score||0)-(a.score||0);}).forEach(function(p){
      var nombreSeguro=p.nombre||'(sin nombre)';
      var totalSeguro=p.total||1;
      var scoreSeguro=p.score||0;
      var pct=Math.round((scoreSeguro/totalSeguro)*100);
      var col3=pct>=80?'#27AE60':pct>=60?'#E67E22':'#E74C3C';
      html+='<div class="p-row">'+
        '<div class="p-av" style="background:'+claro2+';color:'+col2+'">'+nombreSeguro.charAt(0).toUpperCase()+'</div>'+
        '<div style="flex:1;font-size:.88rem;font-weight:600">'+nombreSeguro+'</div>'+
        '<span style="font-size:.95rem;font-weight:800;color:'+col3+'">'+scoreSeguro+'/'+totalSeguro+'</span></div>';
    });
    el.innerHTML=html;
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

function adminTermometros(mod){
  var el=$('asec-termometros');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var items=TERMO[mod];
  var col2=mod==='artistica'?'#7D3C0F':'#1A5C2E';
  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  subCol(mod,'termometros').get().then(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">Aún no hay respuestas del termómetro.</div>';return;}
    var sumas=Array(items.length).fill(0);
    var conts=Array(items.length).fill(0);
    var porPersona=[];
    snap.docs.forEach(function(d){
      var data=d.data();
      if(data.vals) data.vals.forEach(function(v,i){sumas[i]+=v;conts[i]++;});
      porPersona.push({nombre:data.nombre,prom:parseFloat(data.prom)});
    });
    var proms=sumas.map(function(s,i){return conts[i]>0?(s/conts[i]).toFixed(1):'—';});
    var promG=(porPersona.reduce(function(a,b){return a+b.prom;},0)/porPersona.length).toFixed(1);
    var html='<div class="acard">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<span style="font-size:.88rem;font-weight:700">Promedio general</span>'+
      '<span style="font-size:1.5rem;font-weight:800;color:'+col2+'">'+promG+'/10</span></div>';
    items.forEach(function(item,i){
      var p=parseFloat(proms[i])||0;
      var pct=(p/10)*100;
      var c=p<=3?'#27AE60':p<=6?'#E67E22':'#E74C3C';
      html+='<div class="ti-item">'+
        '<div class="ti-row"><span style="font-size:.82rem">'+item+'</span><span style="font-weight:800;color:'+c+'">'+proms[i]+'/10</span></div>'+
        '<div class="ti-bar"><div class="ti-fill" style="width:'+pct+'%;background:'+c+'"></div></div>'+
        '<div style="font-size:.7rem;color:'+c+'">'+(p<=3?'Bajo — positivo':p<=6?'Medio — atención':'⚠️ Alto — prioridad')+'</div></div>';
    });
    if(porPersona.some(function(p){return p.prom>6;})){
      html+='<div style="background:#FEE2E2;border-radius:8px;padding:10px;font-size:.8rem;color:#991B1B;margin-top:10px">⚠️ Hay ítems con promedio alto — merecen atención en el grupo.</div>';
    }
    html+='</div>';
    html+='<p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;padding:0 16px 8px">Por participante</p>';
    porPersona.sort(function(a,b){return (b.prom||0)-(a.prom||0);}).forEach(function(p){
      var nombreSeguro=p.nombre||'(sin nombre)';
      var promSeguro=p.prom||0;
      var c=promSeguro<=3?'#27AE60':promSeguro<=6?'#E67E22':'#E74C3C';
      html+='<div class="p-row">'+
        '<div class="p-av" style="background:'+claro2+';color:'+col2+'">'+nombreSeguro.charAt(0).toUpperCase()+'</div>'+
        '<div style="flex:1;font-size:.88rem;font-weight:600">'+nombreSeguro+'</div>'+
        '<span style="font-size:.95rem;font-weight:800;color:'+c+'">'+promSeguro+'/10</span></div>';
    });
    el.innerHTML=html;
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

function adminReflexiones(mod){
  var el=$('asec-reflexiones');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var temas=TEMAS[mod];
  var col2=mod==='artistica'?'#7D3C0F':'#1A5C2E';
  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  subCol(mod,'reflexiones').get().then(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">Aún no hay reflexiones.</div>';return;}
    var agrup={};
    snap.docs.forEach(function(d){
      var data=d.data();
      var ti=data.temaIdx;
      if(!agrup[ti]) agrup[ti]=[];
      if(data.resps) Object.values(data.resps).forEach(function(txt){
        agrup[ti].push({nombre:data.nombre,texto:txt});
      });
    });
    var html='';
    Object.keys(agrup).sort(function(a,b){return a-b;}).forEach(function(ti){
      html+='<div class="acard">'+
        '<div class="acard-t" style="color:'+col2+';background:'+claro2+';margin:-16px -16px 12px;padding:10px 16px;border-radius:10px 10px 0 0">'+
        'Tema '+(parseInt(ti)+1)+': '+(temas[ti]?temas[ti].nom:'')+'</div>';
      agrup[ti].forEach(function(r){
        html+='<div class="r-item"><div class="r-autor">'+r.nombre+'</div>'+r.texto+'</div>';
      });
      html+='</div>';
    });
    el.innerHTML=html||'<div class="vacio">Sin reflexiones.</div>';
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

function adminMuro(){
  var el=$('asec-muro');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  subCol('conexion_social','muro').orderBy('ts','asc').onSnapshot(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">El muro está vacío.</div>';return;}
    var cols=['#D5F5E3','#D6EAF8','#FAD7A0','#E8DAEF','#FADBD8'];
    el.innerHTML='<p style="font-size:.75rem;color:#5A5A54;margin-bottom:10px">'+snap.size+' mensajes</p>'+
      snap.docs.map(function(d,i){
        var p=d.data();
        return '<div class="muro-post" style="background:'+cols[i%5]+';border-left:4px solid #27AE60">'+
          '<div class="muro-autor">'+p.nombre+'</div>'+p.texto+'</div>';
      }).join('');
  },function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

function adminAcuerdo(){
  var el=$('asec-acuerdo');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  subCol('conexion_social','compromisos').orderBy('votos','desc').onSnapshot(function(snap){
    var html='';
    if(!snap.empty){
      html='<p style="font-size:.75rem;color:#5A5A54;margin-bottom:10px">'+snap.size+' compromisos</p>';
      snap.docs.forEach(function(d,i){
        var p=d.data();
        html+='<div class="acuerdo-item" style="'+(i<5?'border-left:4px solid #27AE60':'')+'">'+
          (i<5?'<span style="font-size:.68rem;font-weight:700;color:#1A5C2E;background:#D5F5E3;padding:2px 8px;border-radius:10px;flex-shrink:0">TOP</span>':'')+
          '<div style="flex:1"><div>'+p.texto+'</div>'+
          '<div style="font-size:.7rem;color:#5A5A54;margin-top:3px">'+p.votos+' votos — '+p.nombre+'</div></div></div>';
      });
      var top5=snap.docs.slice(0,5).map(function(d){return d.data().texto;});
      html+='<div style="background:#D5F5E3;border-radius:10px;padding:14px;margin-top:14px;border:1px solid #27AE60">'+
        '<div style="font-size:.78rem;font-weight:800;color:#1A5C2E;margin-bottom:8px">📜 Acuerdo Oficial (Top 5)</div>'+
        top5.map(function(t,i){return '<div style="font-size:.85rem;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid rgba(0,0,0,.06)"><strong>'+(i+1)+'.</strong> '+t+'</div>';}).join('')+'</div>';
    }
    subCol('conexion_social','acuerdo').doc('firmantes').get().then(function(s){
      if(s.exists){
        var f=s.data().lista||[];
        if(f.length) html+='<div style="margin-top:14px"><p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;margin-bottom:8px">✅ Firmantes ('+f.length+')</p>'+
          '<div class="firmantes">'+f.map(function(n){return '<span class="firmante">'+n+'</span>';}).join('')+'</div></div>';
      }
      el.innerHTML=html||'<div class="vacio">Sin compromisos.</div>';
    });
  },function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}
