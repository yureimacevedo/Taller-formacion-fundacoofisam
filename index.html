function $(id){return document.getElementById(id);}
function pg(id){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  $(id).classList.add('on');
}
function col(mod){return db.collection('talleres').doc(mod);}
function subCol(mod,sub){return col(mod).collection(sub);}
function confeti(){
  var cs=['#E67E22','#27AE60','#2980B9','#9B59B6','#F1C40F'];
  for(var i=0;i<35;i++){
    var c=document.createElement('div');
    c.className='ci';
    c.style.left=Math.random()*100+'vw';
    c.style.top='-10px';
    c.style.background=cs[Math.floor(Math.random()*5)];
    c.style.setProperty('--d',(2+Math.random()).toFixed(1)+'s');
    c.style.setProperty('--dl',(Math.random()*1.2).toFixed(1)+'s');
    document.body.appendChild(c);
    setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},4000);
  }
}

function ingresar(){
  var nombre=$('inp-nombre').value.trim();
  var codigo=$('inp-codigo').value.trim().toUpperCase();
  var err=$('err-login');
  if(!nombre){err.textContent='Escribe tu nombre.';err.classList.add('on');return;}
  if(!CODIGOS[codigo]){err.textContent='C├│digo incorrecto.';err.classList.add('on');return;}
  err.classList.remove('on');
  var info=CODIGOS[codigo];
  S.nombre=nombre; S.mod=info.mod; S.nom=info.nom;
  S.col=info.col; S.claro=info.claro; S.chip=info.chip;
  if(info.mod==='admin'){
    pg('pg-admin');
    iniciarAdmin();
  } else {
    cargarLocal();
    $('app-titulo').textContent=S.nom;
    $('app-chip').innerHTML='<span class="tb-chip '+S.chip+'">'+S.nom+'</span>';
    pg('pg-app');
    mostrarMenu();
  }
}

// QUIZ
// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ
function iniciarQuiz(){
  S.quizIdx=0; S.quizScore=0; S.quizResps=[];
  $('app-footer').style.display='none';
  renderPregunta();
}
function renderPregunta(){
  var qs=QUIZ[S.mod];
  var i=S.quizIdx;
  if(i>=qs.length){finQuiz();return;}
  var q=qs[i];
  // progreso quiz
  $('prog-txt').textContent='Pregunta '+(i+1)+' de '+qs.length;
  $('prog-fill').style.width=(((i+1)/qs.length)*100)+'%';
  $('prog-fill').style.background=S.col;
  var html='<div class="pad">';
  html+='<p style="font-size:.75rem;font-weight:700;color:'+S.col+';text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Pregunta '+(i+1)+' de '+qs.length+'</p>';
  html+='<p class="quiz-enunc">'+q.p+'</p>';
  html+='<div class="quiz-ops">'+q.ops.map(function(o,j){
    return '<button class="quiz-op" data-j="'+j+'">'+o+'</button>';
  }).join('')+'</div>';
  html+='<div class="quiz-fb" id="qfb"></div>';
  html+='</div>';
  $('app-contenido').innerHTML=html;
  $('app-footer').style.display='none';
  document.querySelectorAll('.quiz-op').forEach(function(btn){
    btn.addEventListener('click',function(){responder(parseInt(btn.dataset.j));});
  });
}
function responder(j){
  var q=QUIZ[S.mod][S.quizIdx];
  document.querySelectorAll('.quiz-op').forEach(function(b){b.disabled=true;});
  document.querySelectorAll('.quiz-op')[j].classList.add(j===q.c?'ok':'mal');
  if(j!==q.c) document.querySelectorAll('.quiz-op')[q.c].classList.add('ok');
  if(j===q.c) S.quizScore++;
  S.quizResps.push({pregunta:q.p,opcion:q.ops[j],correcta:q.ops[q.c],ok:j===q.c});
  var fb=$('qfb');
  fb.textContent=(j===q.c?'Ôťů ':'ÔŁî ')+q.fb;
  fb.classList.add('on',j===q.c?'ok':'mal');
  // bot├│n siguiente
  $('app-footer').style.display='';
  $('btn-accion').textContent=S.quizIdx<QUIZ[S.mod].length-1?'Siguiente Ôćĺ':'Ver resultado Ôćĺ';
  $('btn-accion').onclick=function(){S.quizIdx++;renderPregunta();};
}
function finQuiz(){
  var total=QUIZ[S.mod].length;
  var msgs=["┬íBuen comienzo! Hay mucho por descubrir.","┬íBien! Ya conoces bastante del equipo.","┬íMuy bien! Tienes buen ojo para el equipo.","┬íExcelente! Conoces muy bien a tu equipo.","┬íPerfecto! Eres un referente del equipo."];
  var msg=msgs[Math.min(Math.floor(S.quizScore/total*5),4)];
  actualizarProgreso();
  var html='<div class="pad"><div class="quiz-score">'+
    '<div class="score-num" style="color:'+S.col+'">'+S.quizScore+'/'+total+'</div>'+
    '<div class="score-msg">'+msg+'</div></div></div>';
  $('app-contenido').innerHTML=html;
  $('app-footer').style.display='';
  $('btn-accion').textContent='Guardar y continuar Ôćĺ';
  $('btn-accion').onclick=function(){
    // Guardar quiz en Firebase
    subCol(S.mod,'quiz').doc(S.nombre)
      .set({nombre:S.nombre,score:S.quizScore,total:total,resps:S.quizResps,ts:Date.now()})
      .catch(function(){});
    completar(0);
  };
}

function renderTermoHTML(temaIdx){
  var items=TERMO[S.mod];
  var html='<p class="sec-label">Term├│metro del equipo</p>';
  html+='<p style="font-size:.82rem;color:#5A5A54;margin-bottom:10px">Califica del 1 al 10 cada afirmaci├│n.</p>';
  items.forEach(function(item,i){
    html+='<div class="termo-item">'+
      '<div class="termo-label">'+item+'</div>'+
      '<div class="termo-row">'+
      '<span style="font-size:.7rem;color:#5A5A54">Poco</span>'+
      '<input type="range" class="termo-sl" id="ts'+temaIdx+'_'+i+'" min="1" max="10" value="5" '+
      'style="background:linear-gradient(to right,#E67E22 40%,#ddd 40%)">'+
      '<span style="font-size:.7rem;color:#5A5A54">Mucho</span>'+
      '<div class="termo-val" id="tv'+temaIdx+'_'+i+'" style="background:#E67E22">5</div></div>'+
      '<div class="termo-etiq"><span>1</span><span>5</span><span>10</span></div></div>';
  });
  html+='<div class="termo-res" id="tres-'+temaIdx+'"></div>';
  return html;
}
function iniciarEventosTermo(temaIdx){
  TERMO[S.mod].forEach(function(_,i){
    var sl=$('ts'+temaIdx+'_'+i);
    if(sl) sl.addEventListener('input',function(){updateTermo(temaIdx,i);});
  });
}
function updateTermo(ti,i){
  var v=parseInt($('ts'+ti+'_'+i).value);
  var p=((v-1)/9)*100;
  var col=v<=3?'#27AE60':v<=6?'#E67E22':'#E74C3C';
  $('tv'+ti+'_'+i).textContent=v;
  $('tv'+ti+'_'+i).style.background=col;
  $('ts'+ti+'_'+i).style.background='linear-gradient(to right,'+col+' 0%,'+col+' '+p+'%,#ddd '+p+'%)';
  // calcular y mostrar resultado al momento
  calcTermoSilencioso(ti);
}
function calcTermoSilencioso(ti){
  var items=TERMO[S.mod];
  var vals=items.map(function(_,i){
    var el=$('ts'+ti+'_'+i);
    return el?parseInt(el.value):5;
  });
  var prom=vals.reduce(function(a,b){return a+b;},0)/vals.length;
  var col=prom<=3?'#1A5C2E':prom<=6?'#E67E22':'#E74C3C';
  var emoji=prom<=3?'­ččó':prom<=6?'­ččí':'­čö┤';
  var msg=prom<=3?'Puntajes bajos aqu├ş son positivos.':prom<=6?'┬íReconocerlo es el primer paso!':'Estos temas necesitan atenci├│n del equipo.';
  var r=$('tres-'+ti);
  if(r){
    r.innerHTML='<div style="font-size:1.1rem;margin-bottom:4px">'+emoji+'</div>'+
      '<div style="font-size:.9rem;font-weight:700;color:'+col+'">Promedio: '+prom.toFixed(1)+'/10</div>'+
      '<div style="font-size:.8rem;color:#5A5A54;margin-top:3px">'+msg+'</div>';
    r.style.background=col+'15';r.style.border='1px solid '+col+'50';r.classList.add('on');
    S.termometros[ti]={vals:vals,prom:prom.toFixed(1)};
  }
}

function iniciarEventosEscudo(temaIdx){

function iniciarMuro(){
  if(S.muroUnsub) S.muroUnsub();

    var el=$('muro-posts');
    if(!el) return;
    if(snap.empty){el.innerHTML='<div class="vacio">┬íS├ę la primera!</div>';return;}
    var cols=['#D5F5E3','#D6EAF8','#FAD7A0','#E8DAEF','#FADBD8'];
    el.innerHTML=snap.docs.map(function(d,i){
      var p=d.data();
      return '<div class="muro-post" style="background:'+cols[i%5]+'"><div class="muro-autor">'+p.nombre+'</div>'+p.texto+'</div>';
    }).join('');
  },function(){});
  var btnMuro=$('btn-pub-muro');
  if(btnMuro) btnMuro.addEventListener('click',function(){
    var txt=$('muro-input').value.trim();
    if(!txt) return;
    subCol('conexion_social','muro').add({nombre:S.nombre,texto:txt,ts:Date.now()}).catch(function(){});
    $('muro-input').value='';

// ACUERDO
// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ
function iniciarAcuerdo(){
  if(S.acuerdoUnsub) S.acuerdoUnsub();
  S.acuerdoUnsub=subCol('conexion_social','compromisos').orderBy('votos','desc').onSnapshot(function(snap){
    var lista=$('acuerdo-lista');
    if(!lista) return;
    if(!snap.docs.length){lista.innerHTML='<p style="font-size:.83rem;color:#5A5A54">A├║n no hay compromisos.</p>';return;}
    lista.innerHTML=snap.docs.map(function(d){
      var data=d.data();
      var yo=(data.votantes||[]).indexOf(S.nombre)>-1;
      return '<div class="acuerdo-item">'+
        '<div style="flex:1"><div>'+data.texto+'</div>'+
        '<div style="font-size:.7rem;color:#5A5A54;margin-top:3px">­čÖő '+(data.votos||0)+' se unen</div></div>'+
        '<button class="voto-btn '+(yo?'on':'')+'" data-id="'+d.id+'" data-yo="'+yo+'">'+
        (yo?'Ôťô':'+')+' Me uno</button></div>';
    }).join('');
    document.querySelectorAll('.voto-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(btn.dataset.yo==='true') return;
        subCol('conexion_social','compromisos').doc(btn.dataset.id).get().then(function(s){
          var d=s.data();
          s.ref.update({votos:(d.votos||0)+1,votantes:firebase.firestore.FieldValue.arrayUnion(S.nombre)});
        });
      });
    });
  },function(){});
  subCol('conexion_social','acuerdo').doc('firmantes').onSnapshot(function(s){
    if(!s.exists) return;
    var f=s.data().lista||[];
    var sec=$('firmantes-sec');
    if(!f.length||!sec) return;
    sec.style.display='';
    $('firmantes-lista').innerHTML=f.map(function(n){return '<span class="firmante">'+n+'</span>';}).join('');
  });
  var btnPub=$('btn-pub-acuerdo');
  if(btnPub) btnPub.addEventListener('click',function(){
    var txt=$('acuerdo-input').value.trim();
    if(!txt) return;
    subCol('conexion_social','compromisos').add({nombre:S.nombre,texto:txt,votos:0,votantes:[],ts:Date.now()}).catch(function(){});
    $('acuerdo-input').value='';
  });
  var btnFirmar=$('btn-firmar');
  if(btnFirmar) btnFirmar.addEventListener('click',function(){
    subCol('conexion_social','acuerdo').doc('firmantes')
      .set({lista:firebase.firestore.FieldValue.arrayUnion(S.nombre)},{merge:true}).catch(function(){});
    btnFirmar.textContent='Ôťů ┬íFirmaste el Acuerdo!';
    btnFirmar.disabled=true;
  });
}

// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ
// GUARDAR TEMA Y COMPLETAR
// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ
function guardarTema(idx){
  var t=TEMAS[S.mod][idx];
  var resps={};
  // Reflexiones
  if(t.reflexiones) t.reflexiones.forEach(function(_,i){
    var el=$('ref-'+idx+'-'+i);
    if(el&&el.value.trim()) resps[i]=el.value.trim();
  });
  if(Object.keys(resps).length){
    S.reflexiones[idx]=resps;
    subCol(S.mod,'reflexiones').doc(S.nombre+'_t'+idx)
      .set({nombre:S.nombre,temaIdx:idx,resps:resps,ts:Date.now()}).catch(function(){});
  }
  // Term├│metro
  if(t.termometro&&S.termometros[idx]){
    subCol(S.mod,'termometros').doc(S.nombre+'_t'+idx)
      .set({nombre:S.nombre,temaIdx:idx,vals:S.termometros[idx].vals,prom:S.termometros[idx].prom,ts:Date.now()})
      .catch(function(){});
  }
  // Escudo
  if(t.escudo){
    subCol('conexion_social','escudos').doc(S.nombre)
      .set({nombre:S.nombre,escudo:S.escudo,ts:Date.now()}).catch(function(){});
  }
  completar(idx+1);
}
function completar(idx){
  if(S.completados.indexOf(idx)<0) S.completados.push(idx);
  guardarLocal();
  actualizarProgreso();
  var total=TEMAS[S.mod].length+1;
  if(S.completados.length>=total){mostrarCierre();return;}
  mostrarMenu();
}

function cargarSecAdmin(sec){
  document.querySelectorAll('.asec').forEach(function(s){s.classList.remove('on');});

  document.querySelectorAll('.atab').forEach(function(t){t.classList.remove('on');});
  document.querySelector('.atab[data-sec="'+sec+'"]').classList.add('on');
  var mod=S.adminMod;
  if(sec==='panel') adminPanel(mod);
  else if(sec==='quiz') adminQuiz(mod);
  else if(sec==='termometros') adminTermometros(mod);
  else if(sec==='reflexiones') adminReflexiones(mod);

function adminPanel(mod){
  var el=$('asec-panel');

  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  var esperados=mod==='artistica'?7:20;
  Promise.all([
    subCol(mod,'quiz').get(),
    subCol(mod,'reflexiones').get(),
    subCol(mod,'termometros').get(),
    mod==='conexion_social'?subCol(mod,'escudos').get():Promise.resolve({docs:[]}),
  ]).then(function(res){
    var quizSnap=res[0],refSnap=res[1],terSnap=res[2],escSnap=res[3];
    var parts={};
    quizSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].quiz=true;});
    refSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].ref++;});
    terSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].ter=true;});
    escSnap.docs.forEach(function(d){var n=d.data().nombre;if(!parts[n])parts[n]={quiz:false,ref:0,ter:false,esc:false};parts[n].esc=true;});
    var total=Object.keys(parts).length;
    var conQuiz=Object.values(parts).filter(function(p){return p.quiz;}).length;
    var conTer=Object.values(parts).filter(function(p){return p.ter;}).length;
    var conRef=Object.values(parts).filter(function(p){return p.ref>0;}).length;
    var html='<div class="stat-grid">'+
      '<div class="stat-card" style="border-left:4px solid '+col2+'"><div class="stat-num" style="color:'+col2+'">'+total+'</div><div class="stat-lbl">Activos de '+esperados+'</div></div>'+
      '<div class="stat-card" style="border-left:4px solid #9B59B6"><div class="stat-num" style="color:#4A235A">'+conQuiz+'</div><div class="stat-lbl">Completaron quiz</div></div>'+
      '<div class="stat-card" style="border-left:4px solid #2980B9"><div class="stat-num" style="color:#154360">'+conTer+'</div><div class="stat-lbl">Term├│metro</div></div>'+
      '<div class="stat-card" style="border-left:4px solid '+col2+'"><div class="stat-num" style="color:'+col2+'">'+conRef+'</div><div class="stat-lbl">Reflexiones</div></div>'+
    '</div>';
    html+='<p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;padding:0 16px 8px">Participantes</p>';
    if(!total){html+='<div class="vacio">A├║n no hay participantes.</div>';}
    else{
      Object.entries(parts).forEach(function(e){
        var n=e[0]||'(sin nombre)',d=e[1];
        var etapas=(d.quiz?1:0)+(d.ref>0?1:0)+(d.ter?1:0)+(d.esc?1:0);
        var pct=Math.round((etapas/4)*100);
        html+='<div class="p-row">'+
          '<div class="p-av" style="background:'+claro2+';color:'+col2+'">'+n.charAt(0).toUpperCase()+'</div>'+
          '<div style="flex:1"><div style="font-size:.88rem;font-weight:600">'+n+'</div>'+
          '<div style="font-size:.75rem;color:#5A5A54">'+(d.quiz?'­čÄ« ':'')+( d.ter?'­čîí´ŞĆ ':'')+( d.ref>0?'­čĺş ':'')+( d.esc?'­čŤí´ŞĆ ':'')+' </div></div>'+
          '<div class="mbar"><div class="mbar-bg"><div class="mbar-fill" style="width:'+pct+'%;background:'+col2+'"></div></div>'+
          '<div class="mpct" style="color:'+col2+'">'+pct+'%</div></div></div>';
      });
    }
    el.innerHTML=html;
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});

function adminQuiz(mod){
  var el=$('asec-quiz');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var col2=mod==='artistica'?'#7D3C0F':'#1A5C2E';
  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  subCol(mod,'quiz').get().then(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">A├║n no hay respuestas del quiz.</div>';return;}
    // Agrupar respuestas por pregunta
    var pregs=QUIZ[mod];
    var stats=pregs.map(function(){return {ok:0,total:0};});
    var porPersona=[];
    snap.docs.forEach(function(d){
      var data=d.data();
      porPersona.push({nombre:data.nombre,score:data.score,total:data.total,resps:data.resps||[]});
      if(data.resps) data.resps.forEach(function(r,i){
        if(stats[i]){stats[i].total++;if(r.ok)stats[i].ok++;}
      });
    });
    var html='<div class="acard"><div class="acard-t">Resultados por pregunta ('+snap.size+' respuestas)</div>';
    pregs.forEach(function(q,i){
      var s=stats[i];
      var pct=s.total>0?Math.round((s.ok/s.total)*100):0;
      var col3=pct>=70?'#27AE60':pct>=50?'#E67E22':'#E74C3C';
      html+='<div class="ti-item">'+
        '<div class="ti-row"><span style="font-size:.82rem">'+q.p+'</span><span style="font-weight:800;color:'+col3+'">'+pct+'%</span></div>'+
        '<div class="ti-bar"><div class="ti-fill" style="width:'+pct+'%;background:'+col3+'"></div></div>'+
        '<div style="font-size:.7rem;color:#5A5A54">'+s.ok+' correctas de '+s.total+'</div></div>';
    });
    html+='</div>';
    html+='<p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;padding:0 16px 8px">Por participante</p>';
    porPersona.sort(function(a,b){return (b.score||0)-(a.score||0);}).forEach(function(p){
      var nombreSeguro=p.nombre||'(sin nombre)';
      var totalSeguro=p.total||1;
      var scoreSeguro=p.score||0;
      var pct=Math.round((scoreSeguro/totalSeguro)*100);
      var col3=pct>=80?'#27AE60':pct>=60?'#E67E22':'#E74C3C';
      html+='<div class="p-row">'+
        '<div class="p-av" style="background:'+claro2+';color:'+col2+'">'+nombreSeguro.charAt(0).toUpperCase()+'</div>'+
        '<div style="flex:1;font-size:.88rem;font-weight:600">'+nombreSeguro+'</div>'+
        '<span style="font-size:.95rem;font-weight:800;color:'+col3+'">'+scoreSeguro+'/'+totalSeguro+'</span></div>';
    });
    el.innerHTML=html;
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

}

function adminReflexiones(mod){
  var el=$('asec-reflexiones');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  var temas=TEMAS[mod];
  var col2=mod==='artistica'?'#7D3C0F':'#1A5C2E';
  var claro2=mod==='artistica'?'#FAD7A0':'#D5F5E3';
  subCol(mod,'reflexiones').get().then(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">A├║n no hay reflexiones.</div>';return;}
    var agrup={};
    snap.docs.forEach(function(d){
      var data=d.data();
      var ti=data.temaIdx;
      if(!agrup[ti]) agrup[ti]=[];
      if(data.resps) Object.values(data.resps).forEach(function(txt){
        agrup[ti].push({nombre:data.nombre,texto:txt});
      });
    });
    var html='';
    Object.keys(agrup).sort(function(a,b){return a-b;}).forEach(function(ti){
      html+='<div class="acard">'+
        '<div class="acard-t" style="color:'+col2+';background:'+claro2+';margin:-16px -16px 12px;padding:10px 16px;border-radius:10px 10px 0 0">'+
        'Tema '+(parseInt(ti)+1)+': '+(temas[ti]?temas[ti].nom:'')+'</div>';
      agrup[ti].forEach(function(r){
        html+='<div class="r-item"><div class="r-autor">'+r.nombre+'</div>'+r.texto+'</div>';
      });
      html+='</div>';
    });
    el.innerHTML=html||'<div class="vacio">Sin reflexiones.</div>';
  }).catch(function(err){el.innerHTML='<div class="vacio">Error: '+err.message+'</div>';});
}

function adminMuro(){
  var el=$('asec-muro');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  subCol('conexion_social','muro').orderBy('ts','asc').onSnapshot(function(snap){
    if(snap.empty){el.innerHTML='<div class="vacio">El muro est├í vac├şo.</div>';return;}
    var cols=['#D5F5E3','#D6EAF8','#FAD7A0','#E8DAEF','#FADBD8'];
    el.innerHTML='<p style="font-size:.75rem;color:#5A5A54;margin-bottom:10px">'+snap.size+' mensajes</p>'+

          '<div class="muro-autor">'+p.nombre+'</div>'+p.texto+'</div>';
      }).join('');

function adminAcuerdo(){
  var el=$('asec-acuerdo');

          '<div style="flex:1"><div>'+p.texto+'</div>'+

    }

      if(s.exists){

        if(f.length) html+='<div style="margin-top:14px"><p style="font-size:.75rem;font-weight:700;color:#5A5A54;text-transform:uppercase;margin-bottom:8px">Ôťů Firmantes ('+f.length+')</p>'+
          '<div class="firmantes">'+f.map(function(n){return '<span class="firmante">'+n+'</span>';}).join('')+'</div></div>';
      }
      el.innerHTML=html||'<div class="vacio">Sin compromisos.</div>';

// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ
// IMPRIMIR REPORTE
// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ
function imprimirReporte(){
  var mod = S.adminMod;
  var nomMod = mod==='artistica'?'Equipo Art├şstico':'Conexi├│n Social';
  var fecha = new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});

  // Cargar todos los datos y generar ventana de impresi├│n
  Promise.all([
    subCol(mod,'quiz').get(),
    subCol(mod,'reflexiones').get(),
    subCol(mod,'termometros').get(),
    subCol('conexion_social','compromisos').orderBy('votos','desc').get(),
    subCol('conexion_social','acuerdo').doc('firmantes').get(),
    subCol(mod,'reflexiones').get()
  ]).then(function(res){
    var quizSnap=res[0], refSnap=res[1], terSnap=res[2], compSnap=res[3], firmSnap=res[4];

    // Panel general
    var parts={};
    quizSnap.docs.forEach(function(d){var n=d.data().nombre||'?';if(!parts[n])parts[n]={quiz:false,ref:0,ter:false};parts[n].quiz=true;});
    refSnap.docs.forEach(function(d){var n=d.data().nombre||'?';if(!parts[n])parts[n]={quiz:false,ref:0,ter:false};parts[n].ref++;});
    terSnap.docs.forEach(function(d){var n=d.data().nombre||'?';if(!parts[n])parts[n]={quiz:false,ref:0,ter:false};parts[n].ter=true;});
    var total=Object.keys(parts).length;
    var conQuiz=Object.values(parts).filter(function(p){return p.quiz;}).length;
    var conTer=Object.values(parts).filter(function(p){return p.ter;}).length;
    var conRef=Object.values(parts).filter(function(p){return p.ref>0;}).length;

    // Term├│metros
    var items=TERMO[mod];
    var sumas=Array(items.length).fill(0), conts=Array(items.length).fill(0);
    terSnap.docs.forEach(function(d){
      var data=d.data();
      if(data.vals) data.vals.forEach(function(v,i){sumas[i]+=v;conts[i]++;});
    });
    var proms=sumas.map(function(s,i){return conts[i]>0?(s/conts[i]).toFixed(1):'ÔÇö';});

    // Reflexiones agrupadas
    var agrup={};
    var temas=TEMAS[mod];
    refSnap.docs.forEach(function(d){
      var data=d.data();
      var ti=data.temaIdx;
      if(!agrup[ti]) agrup[ti]=[];
      if(data.resps) Object.values(data.resps).forEach(function(txt){
        agrup[ti].push({nombre:data.nombre||'?',texto:txt});
      });
    });

    // Compromisos
    var compromisos=compSnap.docs.map(function(d){return d.data();});
    var firmantes=firmSnap.exists?(firmSnap.data().lista||[]):[];

    // Generar HTML del reporte
    var html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">'+
      '<title>Reporte '+nomMod+' ÔÇö FUNDACOOFISAM</title>'+
      '<style>'+
        'body{font-family:Arial,sans-serif;font-size:13px;color:#1C1C18;margin:0;padding:0}'+
        '.portada{background:#1C1C18;color:#fff;padding:48px 40px;margin-bottom:32px}'+
        '.portada h1{font-size:24px;font-weight:800;margin-bottom:6px}'+
        '.portada p{font-size:14px;opacity:.7}'+
        '.seccion{padding:0 40px 28px}'+
        '.sec-titulo{font-size:16px;font-weight:800;padding:10px 16px;margin-bottom:16px;border-radius:6px}'+
        '.stat-row{display:flex;gap:12px;margin-bottom:20px}'+
        '.stat{flex:1;border:1.5px solid #E8E8E2;border-radius:8px;padding:14px;text-align:center}'+
        '.stat-n{font-size:28px;font-weight:800}'+
        '.stat-l{font-size:11px;color:#5A5A54;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}'+
        '.p-table{width:100%;border-collapse:collapse;margin-bottom:16px}'+
        '.p-table th{background:#F4F4F0;padding:8px 12px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase}'+
        '.p-table td{padding:8px 12px;border-bottom:1px solid #F4F4F0;font-size:12px}'+
        '.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}'+
        '.bv{background:#D5F5E3;color:#1A5C2E} .bn{background:#E8E8E2;color:#5A5A54}'+
        '.termo-item{margin-bottom:10px}'+
        '.termo-label{font-size:12px;font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between}'+
        '.termo-bar{height:8px;background:#E8E8E2;border-radius:4px;overflow:hidden}'+
        '.termo-fill{height:100%;border-radius:4px}'+
        '.r-bloque{margin-bottom:16px;padding:12px 14px;border-left:3px solid #E67E22;background:#FFF9F5;border-radius:0 6px 6px 0}'+
        '.r-tema{font-size:11px;font-weight:700;color:#7D3C0F;text-transform:uppercase;margin-bottom:6px}'+
        '.r-item{margin-bottom:6px;font-size:12px;line-height:1.5}'+
        '.r-autor{font-size:11px;font-weight:700;color:#5A5A54;margin-bottom:2px}'+
        '.comp-item{padding:10px 14px;border:1px solid #E8E8E2;border-radius:6px;margin-bottom:8px;font-size:12px;display:flex;gap:10px}'+
        '.comp-votos{font-size:18px;font-weight:800;color:#1A5C2E;min-width:28px;text-align:center}'+
        '.acuerdo-oficial{background:#D5F5E3;border-radius:8px;padding:16px;border:1px solid #27AE60;margin-bottom:16px}'+
        '.acuerdo-oficial h4{color:#1A5C2E;font-size:13px;margin-bottom:10px}'+
        '.acuerdo-oficial ol{padding-left:18px;font-size:12px;line-height:1.8}'+
        '.firmantes{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}'+
        '.firmante{background:#D5F5E3;color:#1A5C2E;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}'+
        '.pie{text-align:center;padding:24px 40px;font-size:11px;color:#5A5A54;border-top:1px solid #E8E8E2;margin-top:24px}'+
        '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}'+
      '</style></head><body>';

    // PORTADA
    html+='<div class="portada">'+
      '<p style="font-size:12px;opacity:.5;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em">FUNDACOOFISAM</p>'+
      '<h1>Reporte Semana Formativa</h1>'+
      '<p style="font-size:16px;opacity:.9;margin-bottom:8px">'+nomMod+'</p>'+
      '<p>Garz├│n, Huila ÔÇö '+fecha+'</p>'+
      '<p style="margin-top:16px;font-size:12px;opacity:.5">Generado desde el Panel Admin del Taller Formativo</p>'+
    '</div>';

    // SECCI├ôN 1: PANEL GENERAL
    html+='<div class="seccion">'+
      '<div class="sec-titulo" style="background:#F4F4F0;color:#1C1C18">­čôŐ 1. Avance General</div>'+
      '<div class="stat-row">'+
        '<div class="stat"><div class="stat-n" style="color:#7D3C0F">'+total+'</div><div class="stat-l">Participantes activos</div></div>'+
        '<div class="stat"><div class="stat-n" style="color:#4A235A">'+conQuiz+'</div><div class="stat-l">Completaron quiz</div></div>'+
        '<div class="stat"><div class="stat-n" style="color:#154360">'+conTer+'</div><div class="stat-l">Term├│metro</div></div>'+
        '<div class="stat"><div class="stat-n" style="color:#1A5C2E">'+conRef+'</div><div class="stat-l">Reflexiones</div></div>'+
      '</div>';
    // Tabla de participantes
    html+='<table class="p-table"><tr><th>Participante</th><th>Quiz</th><th>Term├│metro</th><th>Reflexiones</th></tr>';
    Object.entries(parts).forEach(function(e){
      var n=e[0],d=e[1];
      html+='<tr><td><strong>'+n+'</strong></td>'+
        '<td><span class="badge '+(d.quiz?'bv':'bn')+'">'+(d.quiz?'Ôťô Complet├│':'Pendiente')+'</span></td>'+
        '<td><span class="badge '+(d.ter?'bv':'bn')+'">'+(d.ter?'Ôťô Complet├│':'Pendiente')+'</span></td>'+
        '<td><span class="badge '+(d.ref>0?'bv':'bn')+'">'+(d.ref>0?d.ref+' respuesta'+(d.ref>1?'s':''):'Pendiente')+'</span></td></tr>';
    });
    html+='</table></div>';

    // SECCI├ôN 2: TERM├ôMETROS
    if(terSnap.size>0){
      html+='<div class="seccion">'+
        '<div class="sec-titulo" style="background:#D6EAF8;color:#154360">­čîí´ŞĆ 2. Term├│metro del Equipo</div>';
      items.forEach(function(item,i){
        var p=parseFloat(proms[i])||0;
        var pct=(p/10)*100;
        var col3=p<=3?'#27AE60':p<=6?'#E67E22':'#E74C3C';
        var nivel=p<=3?'Bajo (positivo)':p<=6?'Medio ÔÇö requiere atenci├│n':'Alto ÔÇö prioridad';
        html+='<div class="termo-item">'+
          '<div class="termo-label"><span>'+item+'</span><span style="color:'+col3+';font-weight:800">'+proms[i]+'/10 ÔÇö '+nivel+'</span></div>'+
          '<div class="termo-bar"><div class="termo-fill" style="width:'+pct+'%;background:'+col3+'"></div></div>'+
        '</div>';
      });
      html+='</div>';
    }

    // SECCI├ôN 3: REFLEXIONES
    if(Object.keys(agrup).length>0){
      html+='<div class="seccion">'+
        '<div class="sec-titulo" style="background:#FEF5E7;color:#7D3C0F">­čĺş 3. Reflexiones de los participantes</div>';
      Object.keys(agrup).sort(function(a,b){return a-b;}).forEach(function(ti){
        html+='<div class="r-bloque">'+
          '<div class="r-tema">Tema '+(parseInt(ti)+1)+': '+(temas[ti]?temas[ti].nom:'')+'</div>';
        agrup[ti].forEach(function(r){
          html+='<div class="r-item"><div class="r-autor">'+r.nombre+'</div>"'+r.texto+'"</div>';
        });
        html+='</div>';
      });
      html+='</div>';
    }

    // SECCI├ôN 4: ACUERDO (solo conexi├│n social)
    if(mod==='conexion_social'&&compromisos.length>0){
      html+='<div class="seccion">'+
        '<div class="sec-titulo" style="background:#D5F5E3;color:#1A5C2E">­čôť 4. Acuerdo de Convivencia</div>';
      // Top 5 oficial
      html+='<div class="acuerdo-oficial">'+
        '<h4>Acuerdo Oficial del Equipo (Top 5 por votos)</h4>'+
        '<ol>'+compromisos.slice(0,5).map(function(c){return '<li>'+c.texto+'</li>';}).join('')+'</ol>'+
      '</div>';
      // Todos los compromisos
      html+='<p style="font-size:12px;font-weight:700;margin-bottom:10px">Todos los compromisos ('+compromisos.length+')</p>';
      compromisos.forEach(function(c){
        html+='<div class="comp-item"><div class="comp-votos">'+c.votos+'</div>'+
          '<div><div>'+c.texto+'</div><div style="font-size:11px;color:#5A5A54;margin-top:3px">'+c.nombre+' ┬Ě '+c.votos+' votos</div></div></div>';
      });
      // Firmantes
      if(firmantes.length){
        html+='<p style="font-size:12px;font-weight:700;margin:14px 0 8px">Firmantes del Acuerdo ('+firmantes.length+')</p>'+
          '<div class="firmantes">'+firmantes.map(function(f){return '<span class="firmante">Ôťô '+f+'</span>';}).join('')+'</div>';
      }
      html+='</div>';
    }

    html+='<div class="pie">Reporte generado el '+fecha+' ÔÇö FUNDACOOFISAM Semana Formativa Garz├│n, Huila</div>';
    html+='</body></html>';

    // Abrir ventana e imprimir
    var win=window.open('','_blank','width=900,height=700');
    win.document.write(html);
    win.document.close();
    win.onload=function(){win.print();};
  }).catch(function(e){
    alert('Error al generar el reporte: '+e.message);
  });
}

// ÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉÔĽÉ

  $('btn-ingresar').addEventListener('click',ingresar);

  $('btn-salir-app').addEventListener('click',function(){pg('pg-login');});

  $('modal-cancel').addEventListener('click',cerrarModal);

  $('modal-escudo').addEventListener('click',function(e){if(e.target===this)cerrarModal();});
  // Admin
  $('btn-salir-admin').addEventListener('click',function(){pg('pg-login');});
  $('btn-imprimir-admin').addEventListener('click',imprimirReporte);
  $('btn-refresh-admin').addEventListener('click',function(){
    var sec=document.querySelector('.atab.on');
    if(sec) cargarSecAdmin(sec.dataset.sec);
  });
  $('amod-artistica').addEventListener('click',function(){
    S.adminMod='artistica';
    $('amod-artistica').classList.add('aa');$('amod-artistica').classList.remove('ac');
    $('amod-conexion').classList.remove('aa','ac');

  $('amod-conexion').addEventListener('click',function(){

    $('amod-artistica').classList.remove('aa','ac');

    $('atab-acuerdo').style.display='';
    cargarSecAdmin('panel');
  });
  document.querySelectorAll('.atab').forEach(function(tab){
    tab.addEventListener('click',function(){cargarSecAdmin(tab.dataset.sec);});
  });
});
